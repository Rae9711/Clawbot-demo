services:
  - type: web
    name: clawbot-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: OLLAMA_URL
        sync: false  # Set this to your Ollama API URL
      - key: OLLAMA_MODEL
        value: qwen2.5:1.5b
    disk:
      name: clawbot-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: clawbot-frontend
    runtime: docker
    plan: starter
    dockerfilePath: ./web/Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_WS_URL
        sync: false  # Set this to wss://clawbot-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
